<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickets — UltraTicket</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --bg2:#0d0d16; --surface:#13131f; --surface2:#1a1a2e;
  --border:rgba(255,255,255,.07); --border2:rgba(255,255,255,.12);
  --text:#e8e8f0; --muted:#6b7280; --muted2:#9ca3af;
  --accent:#7c5cfc; --accent2:#5eead4; --success:#57F287;
  --danger:#ED4245; --warning:#FEE75C; --glow:rgba(124,92,252,.2);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; min-height:100vh; display:flex; flex-direction:column; }

.topbar { background:var(--surface); border-bottom:1px solid var(--border); padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:50; }
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; text-decoration:none; color:var(--text); }
.logo em { background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; font-style:normal; }
.breadcrumb { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13px; }
.breadcrumb a { color:var(--muted); text-decoration:none; }
.breadcrumb a:hover { color:var(--text); }
.btn-sm { padding:6px 14px; border-radius:8px; font-size:13px; font-weight:500; text-decoration:none; cursor:pointer; border:1px solid var(--border); color:var(--muted); background:transparent; font-family:'Inter',sans-serif; transition:.15s; }
.btn-sm:hover { border-color:var(--accent); color:var(--text); }

.content { max-width:1200px; margin:0 auto; padding:36px 32px; width:100%; }
.page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:16px; }
.page-title { font-family:'Syne',sans-serif; font-size:26px; font-weight:800; }
.page-sub { color:var(--muted); font-size:14px; margin-top:2px; }

/* FILTERS */
.filters { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; align-items:center; }
.filter-group { display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:4px; }
.filter-btn { padding:7px 16px; border-radius:7px; font-size:13px; font-weight:500; cursor:pointer; border:none; background:transparent; color:var(--muted); font-family:'Inter',sans-serif; transition:.15s; }
.filter-btn.active { background:var(--accent); color:#fff; }
.search-input { padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif; outline:none; min-width:220px; }
.search-input:focus { border-color:var(--accent); }
.search-input::placeholder { color:var(--muted); }
.cat-filter { padding:10px 14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; color:var(--text); font-size:14px; font-family:'Inter',sans-serif; outline:none; cursor:pointer; }
.cat-filter:focus { border-color:var(--accent); }

/* STATS MINI */
.stats-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
.stat-mini { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 20px; }
.stat-mini-label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:600; margin-bottom:8px; }
.stat-mini-val { font-family:'Syne',sans-serif; font-size:28px; font-weight:800; }

/* TABLE */
.table-wrap { background:var(--surface); border:1px solid var(--border); border-radius:16px; overflow:hidden; }
.table-header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.table-title { font-size:14px; font-weight:600; color:var(--muted2); }
table { width:100%; border-collapse:collapse; }
thead th { text-align:left; padding:12px 20px; font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); border-bottom:1px solid var(--border); font-weight:600; background:var(--bg2); }
tbody tr { transition:.1s; cursor:pointer; }
tbody tr:hover { background:rgba(124,92,252,.04); }
tbody td { padding:14px 20px; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
tbody tr:last-child td { border-bottom:none; }

.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-open { background:rgba(87,242,135,.12); color:var(--success); border:1px solid rgba(87,242,135,.2); }
.badge-closed { background:rgba(237,66,69,.12); color:var(--danger); border:1px solid rgba(237,66,69,.2); }
.badge-pending { background:rgba(254,231,92,.12); color:var(--warning); border:1px solid rgba(254,231,92,.2); }
.priority-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.p-low { background:var(--success); } .p-medium { background:var(--warning); } .p-high { background:#FF9F43; } .p-critical { background:var(--danger); }

.ticket-num { font-family:'Syne',sans-serif; font-weight:700; color:var(--accent); }
.user-cell { display:flex; align-items:center; gap:8px; }
.user-code { font-size:12px; color:var(--muted); background:var(--bg2); padding:2px 8px; border-radius:6px; font-family:monospace; }

.action-btn { padding:5px 12px; border-radius:7px; font-size:12px; font-weight:500; cursor:pointer; border:none; font-family:'Inter',sans-serif; transition:.15s; }
.action-transcript { background:rgba(94,234,212,.1); border:1px solid rgba(94,234,212,.2); color:var(--accent2); }
.action-transcript:hover { background:rgba(94,234,212,.2); }
.action-view { background:rgba(124,92,252,.1); border:1px solid rgba(124,92,252,.2); color:var(--accent); }
.action-view:hover { background:rgba(124,92,252,.2); }

/* DETAIL PANEL */
.detail-overlay { position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(4px); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
.detail-overlay.open { display:flex; }
.detail-panel { background:var(--surface); border:1px solid var(--border2); border-radius:20px; width:100%; max-width:540px; max-height:90vh; overflow-y:auto; }
.detail-header { padding:24px; border-bottom:1px solid var(--border); display:flex; align-items:flex-start; justify-content:space-between; gap:16px; }
.detail-num { font-family:'Syne',sans-serif; font-size:22px; font-weight:800; }
.detail-close { width:30px; height:30px; border-radius:8px; background:var(--surface2); border:1px solid var(--border); color:var(--muted); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.15s; flex-shrink:0; }
.detail-close:hover { color:var(--text); }
.detail-body { padding:24px; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:20px; }
.detail-field { background:var(--bg2); border-radius:10px; padding:12px 14px; }
.detail-field-label { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:600; margin-bottom:4px; }
.detail-field-val { font-size:13px; font-weight:500; }
.detail-actions { display:flex; gap:10px; flex-wrap:wrap; }
.btn-full { display:flex; align-items:center; gap:8px; padding:10px 18px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; border:none; font-family:'Inter',sans-serif; transition:.2s; }
.btn-transcript { background:rgba(94,234,212,.12); border:1px solid rgba(94,234,212,.25); color:var(--accent2); }
.btn-transcript:hover { background:rgba(94,234,212,.22); }

/* EMPTY & LOADING */
.empty-state { text-align:center; padding:64px 24px; color:var(--muted); }
.empty-icon { font-size:48px; margin-bottom:16px; }
.spinner { width:28px; height:28px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin:40px auto; }
@keyframes spin { to { transform:rotate(360deg); } }

.toast-container { position:fixed; bottom:24px; right:24px; z-index:400; display:flex; flex-direction:column; gap:8px; }
.toast { background:var(--surface); border:1px solid var(--border2); border-radius:12px; padding:12px 16px; font-size:13px; box-shadow:0 8px 25px rgba(0,0,0,.4); animation:slideIn .3s ease; }
@keyframes slideIn { from { transform:translateX(100%); opacity:0; } }

.pagination { display:flex; align-items:center; gap:8px; justify-content:center; margin-top:20px; }
.page-btn { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer; border:1px solid var(--border); background:var(--surface); color:var(--text); font-size:13px; font-weight:500; transition:.15s; }
.page-btn:hover,.page-btn.active { background:var(--accent); border-color:var(--accent); color:#fff; }
.page-btn:disabled { opacity:.4; cursor:default; }

@media (max-width:768px) {
  .content { padding:20px; }
  .stats-row { grid-template-columns:1fr 1fr; }
  .filters { flex-direction:column; align-items:stretch; }
  .search-input { min-width:100%; }
  table { font-size:12px; }
  thead th, tbody td { padding:10px 12px; }
  .detail-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>
<div class="topbar">
  <div style="display:flex;align-items:center;gap:16px">
    <a href="/dashboard" class="logo">🎫 <em>UltraTicket</em></a>
    <div class="breadcrumb">
      <span style="color:var(--border2)">/</span>
      <a id="breadGuild" href="#">Servidor</a>
      <span style="color:var(--border2)">/</span>
      <span style="color:var(--text)">Tickets</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <img id="userAvatar" src="" alt="" style="width:30px;height:30px;border-radius:50%;border:2px solid var(--border2)">
    <a href="/auth/logout" class="btn-sm">Salir</a>
  </div>
</div>

<div class="content">
  <div class="page-header">
    <div>
      <div class="page-title">🎫 Tickets</div>
      <div class="page-sub">Gestiona y revisa todos los tickets de tu servidor</div>
    </div>
    <a id="backBtn" href="#" class="btn-sm" style="border-color:var(--accent);color:var(--accent)">← Volver al panel</a>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-mini">
      <div class="stat-mini-label">📊 Total</div>
      <div class="stat-mini-val" id="statTotal" style="color:var(--accent)">—</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-label">🟢 Abiertos</div>
      <div class="stat-mini-val" id="statOpen" style="color:var(--success)">—</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-label">🔒 Cerrados</div>
      <div class="stat-mini-val" id="statClosed" style="color:var(--danger)">—</div>
    </div>
    <div class="stat-mini">
      <div class="stat-mini-label">📅 Hoy</div>
      <div class="stat-mini-val" id="statToday" style="color:var(--accent2)">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <div class="filter-group">
      <button class="filter-btn active" data-status="">Todos</button>
      <button class="filter-btn" data-status="open">Abiertos</button>
      <button class="filter-btn" data-status="closed">Cerrados</button>
    </div>
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar por ID o usuario...">
    <select class="cat-filter" id="catFilter">
      <option value="">Todas las categorías</option>
    </select>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <div class="table-header">
      <span class="table-title" id="tableCount">Cargando...</span>
      <span style="font-size:12px;color:var(--muted)">Haz clic en un ticket para ver detalles</span>
    </div>
    <div id="tableContainer">
      <div class="spinner"></div>
    </div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-panel">
    <div class="detail-header">
      <div>
        <div class="detail-num" id="detailNum">#0000</div>
        <div style="font-size:13px;color:var(--muted);margin-top:2px" id="detailCat">Categoría</div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="detail-body">
      <div class="detail-grid" id="detailGrid"></div>
      <div id="detailSubject" style="margin-bottom:16px;display:none">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:6px">📌 Asunto</div>
        <div style="background:var(--bg2);border-radius:10px;padding:12px 14px;font-size:14px" id="detailSubjectText"></div>
      </div>
      <div id="detailCloseReason" style="margin-bottom:16px;display:none">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:6px">🔒 Razón de cierre</div>
        <div style="background:rgba(237,66,69,.08);border:1px solid rgba(237,66,69,.15);border-radius:10px;padding:12px 14px;font-size:14px" id="detailCloseReasonText"></div>
      </div>
      <div id="detailFeedback" style="margin-bottom:20px;display:none">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:600;margin-bottom:6px">💬 Feedback del usuario</div>
        <div style="background:rgba(254,231,92,.06);border:1px solid rgba(254,231,92,.15);border-radius:10px;padding:12px 14px;font-size:14px" id="detailFeedbackText"></div>
      </div>
      <div class="detail-actions" id="detailActions"></div>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const guildId = location.pathname.split('/')[2];
let allTickets = [], filteredTickets = [], categories = [];
let currentPage = 1;
const perPage = 20;
let currentStatus = '';
let currentDetail = null;

async function init() {
  document.getElementById('backBtn').href = `/dashboard/${guildId}`;
  document.getElementById('breadGuild').href = `/dashboard/${guildId}`;

  const user = await fetch('/api/user').then(r => r.json()).catch(() => ({}));
  if (user.avatar) {
    document.getElementById('userAvatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=32`;
  }

  const guilds = await fetch('/api/guilds').then(r => r.json()).catch(() => []);
  const guild = guilds.find(g => g.id === guildId);
  if (guild) {
    document.title = `Tickets — ${guild.name} | UltraTicket`;
    document.getElementById('breadGuild').textContent = guild.name;
  }

  await loadTickets();
  await loadCategories();

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  document.getElementById('catFilter').addEventListener('change', applyFilters);
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentStatus = btn.dataset.status;
      currentPage = 1;
      applyFilters();
    });
  });

  document.getElementById('detailOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('detailOverlay')) closeDetail();
  });
}

async function loadTickets() {
  const data = await fetch(`/api/guilds/${guildId}/tickets`).then(r => r.json());
  allTickets = data.tickets || [];
  const stats = data.stats;
  document.getElementById('statTotal').textContent = stats.total;
  document.getElementById('statOpen').textContent = stats.open;
  document.getElementById('statClosed').textContent = stats.closed;
  document.getElementById('statToday').textContent = stats.today;
  applyFilters();
}

async function loadCategories() {
  categories = await fetch(`/api/guilds/${guildId}/categories`).then(r => r.json()).catch(() => []);
  const sel = document.getElementById('catFilter');
  categories.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = `${c.emoji} ${c.name}`;
    sel.appendChild(opt);
  });
}

function applyFilters() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;

  filteredTickets = allTickets.filter(t => {
    if (currentStatus && t.status !== currentStatus) return false;
    if (cat && t.category_id != cat) return false;
    if (search) {
      const numMatch = String(t.ticket_number).includes(search);
      const userMatch = t.creator_id.includes(search);
      const subjectMatch = (t.subject || '').toLowerCase().includes(search);
      if (!numMatch && !userMatch && !subjectMatch) return false;
    }
    return true;
  });

  currentPage = 1;
  renderTable();
}

function renderTable() {
  const container = document.getElementById('tableContainer');
  const total = filteredTickets.length;
  document.getElementById('tableCount').textContent = `${total} ticket${total !== 1 ? 's' : ''}`;

  if (!total) {
    container.innerHTML = `<div class="empty-state"><div class="empty-icon">🔍</div><p>No se encontraron tickets</p></div>`;
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const start = (currentPage - 1) * perPage;
  const pageTickets = filteredTickets.slice(start, start + perPage);

  const priorityMap = { low: ['p-low','Baja'], medium: ['p-medium','Media'], high: ['p-high','Alta'], critical: ['p-critical','Crítica'] };

  container.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Estado</th>
          <th>Prioridad</th>
          <th>Usuario</th>
          <th>Categoría</th>
          <th>Fecha</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        ${pageTickets.map(t => {
          const cat = categories.find(c => c.id === t.category_id);
          const [pClass, pLabel] = priorityMap[t.priority] || ['p-medium','Media'];
          const date = new Date(t.created_at * 1000).toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric' });
          return `
            <tr onclick="openDetail(${t.id})">
              <td><span class="ticket-num">#${String(t.ticket_number).padStart(4,'0')}</span></td>
              <td><span class="badge ${t.status === 'open' ? 'badge-open' : 'badge-closed'}">${t.status === 'open' ? '● Abierto' : '● Cerrado'}</span></td>
              <td><div style="display:flex;align-items:center;gap:6px"><div class="priority-dot ${pClass}"></div>${pLabel}</div></td>
              <td><span class="user-code">${t.creator_id}</span></td>
              <td>${cat ? `${cat.emoji} ${cat.name}` : '<span style="color:var(--muted)">—</span>'}</td>
              <td style="color:var(--muted)">${date}</td>
              <td onclick="event.stopPropagation()">
                <button class="action-btn action-transcript" onclick="downloadTranscript(${t.id}, event)">📄 Transcript</button>
              </td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;

  renderPagination(total);
}

function renderPagination(total) {
  const pages = Math.ceil(total / perPage);
  if (pages <= 1) { document.getElementById('pagination').innerHTML = ''; return; }
  let html = '';
  if (currentPage > 1) html += `<button class="page-btn" onclick="goPage(${currentPage-1})">‹</button>`;
  for (let i = Math.max(1, currentPage - 2); i <= Math.min(pages, currentPage + 2); i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  if (currentPage < pages) html += `<button class="page-btn" onclick="goPage(${currentPage+1})">›</button>`;
  document.getElementById('pagination').innerHTML = html;
}

function goPage(p) { currentPage = p; renderTable(); window.scrollTo({ top: 0, behavior: 'smooth' }); }

async function openDetail(id) {
  const data = await fetch(`/api/guilds/${guildId}/tickets/${id}`).then(r => r.json()).catch(() => null);
  if (!data) return;
  const { ticket: t, category: cat } = data;
  currentDetail = t;

  document.getElementById('detailNum').textContent = `#${String(t.ticket_number).padStart(4,'0')}`;
  document.getElementById('detailCat').textContent = cat ? `${cat.emoji} ${cat.name}` : 'Sin categoría';

  const formatDate = ts => ts ? new Date(ts * 1000).toLocaleString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '—';
  const priorityLabels = { low:'🟢 Baja', medium:'🟡 Media', high:'🟠 Alta', critical:'🔴 Crítica' };

  document.getElementById('detailGrid').innerHTML = `
    <div class="detail-field"><div class="detail-field-label">Estado</div><div class="detail-field-val"><span class="badge ${t.status === 'open' ? 'badge-open' : 'badge-closed'}">${t.status === 'open' ? 'Abierto' : 'Cerrado'}</span></div></div>
    <div class="detail-field"><div class="detail-field-label">Prioridad</div><div class="detail-field-val">${priorityLabels[t.priority] || t.priority}</div></div>
    <div class="detail-field"><div class="detail-field-label">Creador</div><div class="detail-field-val"><code style="font-size:12px;background:var(--bg);padding:2px 6px;border-radius:4px">${t.creator_id}</code></div></div>
    <div class="detail-field"><div class="detail-field-label">Reclamado por</div><div class="detail-field-val">${t.claimed_by ? `<code style="font-size:12px;background:var(--bg);padding:2px 6px;border-radius:4px">${t.claimed_by}</code>` : '<span style="color:var(--muted)">Sin reclamar</span>'}</div></div>
    <div class="detail-field"><div class="detail-field-label">Abierto</div><div class="detail-field-val" style="font-size:12px">${formatDate(t.created_at)}</div></div>
    <div class="detail-field"><div class="detail-field-label">Cerrado</div><div class="detail-field-val" style="font-size:12px">${formatDate(t.closed_at)}</div></div>
    ${t.rating ? `<div class="detail-field" style="grid-column:1/-1"><div class="detail-field-label">Calificación</div><div class="detail-field-val" style="color:var(--warning)">${'⭐'.repeat(t.rating)} (${t.rating}/5)</div></div>` : ''}
  `;

  const subjectEl = document.getElementById('detailSubject');
  if (t.subject) { subjectEl.style.display = 'block'; document.getElementById('detailSubjectText').textContent = t.subject; }
  else subjectEl.style.display = 'none';

  const closeEl = document.getElementById('detailCloseReason');
  if (t.close_reason) { closeEl.style.display = 'block'; document.getElementById('detailCloseReasonText').textContent = t.close_reason; }
  else closeEl.style.display = 'none';

  const feedEl = document.getElementById('detailFeedback');
  if (t.feedback) { feedEl.style.display = 'block'; document.getElementById('detailFeedbackText').textContent = t.feedback; }
  else feedEl.style.display = 'none';

  document.getElementById('detailActions').innerHTML = `
    <button class="btn-full btn-transcript" onclick="downloadTranscript(${t.id}, event)">📄 Descargar transcripción</button>
    <button class="btn-full" style="background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.2);color:var(--accent)" onclick="viewTranscript(${t.id})">👁️ Ver en navegador</button>
  `;

  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); currentDetail = null; }

async function downloadTranscript(id, e) {
  if (e) e.stopPropagation();
  const link = document.createElement('a');
  link.href = `/api/guilds/${guildId}/tickets/${id}/transcript`;
  link.download = `ticket-${id}-transcript.html`;
  link.click();
  toast('📄 Descargando transcripción...', 'info');
}

function viewTranscript(id) {
  window.open(`/api/guilds/${guildId}/tickets/${id}/transcript`, '_blank');
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = 'toast';
  el.style.borderColor = type === 'error' ? 'rgba(237,66,69,.3)' : type === 'info' ? 'rgba(94,234,212,.3)' : 'rgba(87,242,135,.3)';
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

init();
</script>
</body>
</html>
